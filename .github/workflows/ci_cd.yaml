name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.get_project_info.outputs.project_name }}
      project_version: ${{ steps.get_project_info.outputs.project_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Project Info
        id: get_project_info
        run: |
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: ${{ steps.get_project_info.outputs.project_name }}%0A🔖 Version: ${{ steps.get_project_info.outputs.project_version }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  #---

  # Job untuk build aplikasi
  build:
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [sigap]
        include:
          # - app: dev
          #   port: 4042
          #   folder: dev
          #   db: dev
          #   env: staging
          #   url: https://dev.amtsilatipusat.com
          - app: sigap
            port: 4043
            folder: sigap
            db: sigap
            env: production
            url: https://sigap.amtsilatipusat.com

    outputs:
      build_status: ${{ job.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify pnpm-lock.yaml exists
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pnpm-lock.yaml found"
          else
            echo "Error: pnpm-lock.yaml not found. Please commit it."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.4

      # --- Implementasi Cache ---
      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Cache Next.js build cache
        uses: actions/cache@v3
        with:
          path: ./.next/cache
          key: ${{ runner.os }}-nextjs-build-${{ hashFiles('**/pnpm-lock.yaml', '**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-
      # --- Akhir Implementasi Cache ---
      - name: Create .env file
        run: |
          echo "DIRECT_DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}" > .env
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}?pgbouncer=true" > .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_BOT_TOKEN_REPORT=${{ secrets.TELEGRAM_BOT_TOKEN_REPORT }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HUSKY=0" >> .env
          echo "NODE_ENV=${{ matrix.env }}" >> .env
          echo "NEXT_PUBLIC_IS_PRODUCTION=${{ matrix.env }}" >> .env
          echo "NEXT_PUBLIC_APP_VERSION=${{ needs.start_notify.outputs.project_version || '1.0.0' }}" >> .env

          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "WHATSAPP_API_KEY=${{ secrets.WHATSAPP_API_KEY }}" >> .env
          echo "WA_API_KEY=${{ secrets.WA_API_KEY }}" >> .env
          echo "WA_ENDPOINT=${{ secrets.WA_ENDPOINT }}" >> .env

          # Google Drive (OAuth2)
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}" >> .env
          echo "DRIVE_DAUROH_FOLDER_ID=${{ secrets.DRIVE_DAUROH_FOLDER_ID }}" >> .env
          echo "DRIVE_PUBLIC=true" >> .env

          # Dauroh config
          echo "DAUROH_MAX_FILE_SIZE_MB=100" >> .env
          echo "DAUROH_MAX_UPLOADS=5" >> .env

          # Eksternal API config
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Migrations
        env:
          DIRECT_DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}?pgbouncer=true
          DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}?pgbouncer=true

        run: |
          for i in {1..3}; do
            npx prisma migrate deploy && exit 0 || true
            echo "Migration failed, retrying in 5 seconds ($i/3)..."
            sleep 5
          done
          echo "Failed to run Prisma migrations after 3 attempts."
          exit 1

      - name: Build Next.js app
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm build

      # --- Mengelola Artefak ---
      - name: Package artifacts
        run: |
          # Include all necessary Next.js 16 files and directories
          tar -czf build-files.tar.gz \
            .next/ \
            public/ \
            package.json \
            pnpm-lock.yaml \
            next.config.ts \
            tailwind.config.ts \
            tsconfig.json \
            .env.example

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          # Perbaikan: Membuat nama artefak unik per aplikasi
          name: absensi-build-tarball-${{ matrix.app }}
          path: build-files.tar.gz
          retention-days: 1
      # --- Akhir Mengelola Artefak ---

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: [build, start_notify]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [sigap]
        include:
          # - app: dev
          #   port: 4042
          #   folder: dev
          #   db: dev
          #   env: staging
          #   url: https://dev.amtsilatipusat.com
          - app: sigap
            port: 4043
            folder: sigap
            db: sigap
            env: production
            url: https://sigap.amtsilatipusat.com

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          # Perbaikan: Mengunduh artefak dengan nama unik yang sesuai
          name: absensi-build-tarball-${{ matrix.app }}
          path: ./

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts entry
        run: |
          ssh-keyscan ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Clone or pull on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          if [ ! -d "/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}" ]; then
            echo "Directory not found, cloning..."
            GIT_URL="https://${{ secrets.GH_PAT }}@github.com/azkal182/sigap-v2.git"
            git clone "\$GIT_URL" /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git checkout main
          else
            echo "Directory exists, pulling latest code..."
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git pull origin main
          fi
          exit
          EOF

      - name: Deploy to VPS
        run: |
          rsync -avz build-files.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          # Hapus file lama termasuk semua file build Next.js 16
          rm -rf .next/ public/ package.json pnpm-lock.yaml next.config.ts tailwind.config.ts tsconfig.json .env.example

          # Ekstrak artefak
          tar -xzf build-files.tar.gz
          rm build-files.tar.gz

          # Verifikasi struktur build Next.js 16
          echo "Verifying Next.js 16 build structure..."
          if [ -d ".next" ]; then
            echo "✓ .next directory found"
            ls -la .next/ | head -10
          else
            echo "❌ .next directory missing!"
            exit 1
          fi

          # Periksa file manifest yang diharapkan Next.js 16
          if [ -f ".next/server/app-manifest.json" ] || [ -d ".next/server/pages" ] || [ -d ".next/server/app" ]; then
            echo "✓ Next.js 16 server files found"
          else
            echo "⚠️ Next.js 16 server structure not as expected, but continuing..."
          fi

          # Buat .env
          rm .env
          echo "DIRECT_DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}" >> .env
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:35060/${{ matrix.db }}?pgbouncer=true" >> .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_BOT_TOKEN_REPORT=${{ secrets.TELEGRAM_BOT_TOKEN_REPORT }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "NEXT_PUBLIC_APP_VERSION=${{ needs.start_notify.outputs.project_version || '2.0.0' }}" >> .env
          echo "NODE_ENV=${{ matrix.env }}" >> .env
          echo "NEXT_PUBLIC_IS_PRODUCTION=${{ matrix.env }}" >> .env
          echo "HUSKY=0" >> .env

          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "WHATSAPP_API_KEY=${{ secrets.WHATSAPP_API_KEY }}" >> .env
          echo "WA_API_KEY=${{ secrets.WA_API_KEY }}" >> .env
          echo "WA_ENDPOINT=${{ secrets.WA_ENDPOINT }}" >> .env

          # Google Drive (OAuth2)
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}" >> .env
          echo "DRIVE_DAUROH_FOLDER_ID=${{ secrets.DRIVE_DAUROH_FOLDER_ID }}" >> .env
          echo "DRIVE_PUBLIC=true" >> .env

          # Dauroh config
          echo "DAUROH_MAX_FILE_SIZE_MB=100" >> .env
          echo "DAUROH_MAX_UPLOADS=5" >> .env

          # Eksternal API config
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env

          # Install dependensi
          pnpm install --production

          # Verify Next.js 16 build structure and files
          echo "🔍 Verifying Next.js 16 deployment files..."

          # Check critical Next.js 16 files
          REQUIRED_FILES=(".next/server/next-server.js.nft" ".next/server/middleware-manifest.json" ".next/server/app-manifest.json")
          MISSING_FILES=()

          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found: $file"
            else
              echo "⚠️  Missing: $file"
              MISSING_FILES+=("$file")
            fi
          done

          # Check for required directories
          REQUIRED_DIRS=(".next/static" ".next/server" ".next/cache")
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              echo "✓ Found directory: $dir"
            else
              echo "⚠️  Missing directory: $dir"
            fi
          done

          # If critical files are missing, attempt to fix with Next.js 16 specific commands
          if [ ${#MISSING_FILES[@]} -gt 0 ]; then
            echo "🔧 Attempting to fix missing Next.js 16 files..."

            # Try to regenerate missing files if possible
            if [ -f "package.json" ] && [ -d "node_modules" ]; then
              echo "Running Next.js build verification..."
              npx next build --debug 2>&1 | head -20 || echo "Build verification completed with warnings"
            fi
          fi

          # Restart PM2 dengan penanganan error yang lebih baik
          echo "🔄 Restarting PM2 process..."
          if pm2 describe ${{ matrix.app }} > /dev/null; then
            echo "Stopping existing process..."
            pm2 stop ${{ matrix.app }} || echo "Failed to stop process (may not be running)"
            pm2 delete ${{ matrix.app }} || echo "Failed to delete process (may not exist)"
          fi

          # Start dengan logging yang lebih detail
          echo "Starting application on port ${{ matrix.port }}..."
          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          # Verifikasi aplikasi berjalan
          sleep 5
          if pm2 describe ${{ matrix.app }} > /dev/null; then
            echo "✅ Application started successfully"
            pm2 logs ${{ matrix.app }} --lines 10 --nostream || echo "No logs available"
          else
            echo "❌ Failed to start application"
            exit 1
          fi
          EOF
  #---
  # Job untuk notifikasi
  notify:
    needs: [start_notify, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.start_notify.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Send Telegram Notification
        run: |
          STATUS_ICON="✅"
          STATUS_TEXT="CI/CD Success"
          if [[ "${{ needs.build.result }}" != "success" || "${{ needs.deploy.result }}" != "success" ]]; then
            STATUS_ICON="❌"
            STATUS_TEXT="CI/CD Failed"
          fi

          MESSAGE="<b>$STATUS_ICON $STATUS_TEXT</b>%0A"
          MESSAGE+="📦 Project: ${{ env.PROJECT_NAME }}%0A"
          MESSAGE+="🔖 Version: ${{ env.PROJECT_VERSION }}%0A"
          MESSAGE+="🌍 URL: https://sigap.amtsilatipusat.com%0A"
          MESSAGE+="🕒 Time: ${{ env.TIMESTAMP }}%0A"

          if [[ "$STATUS_TEXT" == "CI/CD Failed" ]]; then
            MESSAGE+="🚨 Please check logs!"
          fi

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "text=$MESSAGE"
