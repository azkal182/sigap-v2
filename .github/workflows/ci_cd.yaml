name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: Absensi Apps%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Job untuk build aplikasi
  build:
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4040
            folder: absensi
            db: absensi
            url: https://staging.amtsilatipusat.com

    outputs:
      project_name: ${{ steps.set_project_info.outputs.project_name }}
      project_version: ${{ steps.set_project_info.outputs.project_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Langkah ini sekarang akan secara eksplisit gagal jika Prisma tidak dapat menemukan DATABASE_URL
      - name: Run Prisma Migrations
        run: |
          set -e
          # Menulis DATABASE_URL ke file .env agar Prisma CLI dapat membacanya
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" > .env

          # Pastikan file .env berhasil dibuat
          echo "Created .env file with DATABASE_URL"

          # Jalankan migrasi Prisma
          npx prisma migrate deploy || (sleep 10 && npx prisma migrate deploy)

          # Hapus file .env setelah selesai
          rm .env

          echo "Prisma migrations completed."
      - name: Build Next.js app
        env:
          DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:6432/pool_${{ matrix.db }}?pgbouncer=true
          DIRECT_DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true
          NEXTAUTH_URL: ${{ matrix.url }}
          AUTH_TRUST_HOST: ${{ matrix.url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: pnpm build

      # Langkah ini sekarang memiliki penanganan error yang lebih baik
      - name: Get Project Info
        id: set_project_info
        run: |
          # Periksa apakah jq tersedia, jika tidak, gunakan nilai default
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4040
            folder: absensi
            db: absensi
            url: https://staging.amtsilatipusat.com

    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Clone or pull on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          if [ ! -d "/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}" ]; then
            echo "Directory not found, cloning..."
            git clone https://github.com/azkal182/absensi-ppdf.git /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git checkout main
          else
            echo "Directory exists, pulling latest code..."
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git pull origin main
          fi
          exit
          EOF

      - name: Copy build files
        run: |
          rsync -avz --delete .next/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/.next/
          rsync -avz --delete public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/public/
          rsync -avz --delete package.json pnpm-lock.yaml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

      - name: Install deps and restart app on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          if pm2 describe ${{ matrix.app }} > /dev/null; then
            pm2 stop ${{ matrix.app }}
            pm2 delete ${{ matrix.app }}
          fi

          pnpm install --production

          echo "DIRECT_DATABASE_URL=\"postgresql://azkal:azkal@localhost:5432/${{ matrix.db }}?pgbouncer=true\"" > .env
          echo "DATABASE_URL=\"postgresql://azkal:azkal@localhost:6432/pool_${{ matrix.db }}?pgbouncer=true\"" >> .env
          echo "NEXTAUTH_URL=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_TRUST_HOST=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env

          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          exit
          EOF

  #---

  # Job untuk notifikasi
  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.build.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.build.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      # Kondisi akan mengecek status dari setiap job yang dibutuhkan
      - name: Notify Success
        if: success() && needs.build.result == 'success' && needs.deploy.result == 'success'
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ CI/CD Success%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🌍 URL: https://staging.amtsilatipusat.com%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}"

      - name: Notify Failure
        if: failure() || (needs.build.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy.result == 'skipped')
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ CI/CD Failed%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}%0APlease check logs!"
