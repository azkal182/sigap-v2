name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.get_project_info.outputs.project_name }}
      project_version: ${{ steps.get_project_info.outputs.project_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Project Info
        id: get_project_info
        run: |
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: ${{ steps.get_project_info.outputs.project_name }}%0A🔖 Version: ${{ steps.get_project_info.outputs.project_version }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  #---

  # Job untuk build aplikasi
  build:
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    outputs:
      build_status: ${{ job.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify pnpm-lock.yaml exists
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pnpm-lock.yaml found"
          else
            echo "Error: pnpm-lock.yaml not found. Please commit it."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.4

      # --- Implementasi Cache ---
      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      # --- Akhir Implementasi Cache ---
      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:6432/pool_${{ matrix.db }}?pgbouncer=true" > .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HUSKY=0" >> .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:6432/pool_${{ matrix.db }}?pgbouncer=true

        run: |
          for i in {1..3}; do
            npx prisma migrate deploy && exit 0 || true
            echo "Migration failed, retrying in 5 seconds ($i/3)..."
            sleep 5
          done
          echo "Failed to run Prisma migrations after 3 attempts."
          exit 1

      - name: Build Next.js app
        run: pnpm build

      # --- Mengelola Artefak ---
      - name: Package artifacts
        run: |
          # Perbaikan di sini: Hapus baris 'rm -rf .next/' yang menyebabkan error
          tar -czf build-files.tar.gz .next/ public/ package.json pnpm-lock.yaml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: absensi-build-tarball
          path: build-files.tar.gz
          retention-days: 1
      # --- Akhir Mengelola Artefak ---

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: absensi-build-tarball
          path: ./

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts entry
        run: |
          ssh-keyscan ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          rsync -avz build-files.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          rm -rf .next/ public/ package.json pnpm-lock.yaml

          tar -xzf build-files.tar.gz
          rm build-files.tar.gz

          if pm2 describe ${{ matrix.app }} > /dev/null; then
            pm2 stop ${{ matrix.app }}
          fi


          echo "DATABASE_URL=\"postgresql://azkal:azkal@localhost:6432/pool_${{ matrix.db }}?pgbouncer=true\"" >> .env
          echo "NEXTAUTH_URL=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_TRUST_HOST=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "NEXT_PUBLIC_APP_VERSION=${{ needs.start_notify.outputs.project_version }}" >> .env
          echo "NODE_ENV=production" >> .env
          echo "HUSKY=0" >> .env
          pnpm install --production

          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          exit
          EOF

  #---

  # Job untuk notifikasi
  notify:
    needs: [start_notify, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.start_notify.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Send Telegram Notification
        run: |
          STATUS_ICON="✅"
          STATUS_TEXT="CI/CD Success"
          if [[ "${{ needs.build.result }}" != "success" || "${{ needs.deploy.result }}" != "success" ]]; then
            STATUS_ICON="❌"
            STATUS_TEXT="CI/CD Failed"
          fi

          MESSAGE="<b>$STATUS_ICON $STATUS_TEXT</b>%0A"
          MESSAGE+="📦 Project: ${{ env.PROJECT_NAME }}%0A"
          MESSAGE+="🔖 Version: ${{ env.PROJECT_VERSION }}%0A"
          MESSAGE+="🌍 URL: https://staging.amtsilatipusat.com%0A"
          MESSAGE+="🕒 Time: ${{ env.TIMESTAMP }}%0A"

          if [[ "$STATUS_TEXT" == "CI/CD Failed" ]]; then
            MESSAGE+="🚨 Please check logs!"
          fi

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "text=$MESSAGE"
