name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    steps:
      # Checkout code di awal agar bisa mengakses package.json
      - name: Checkout code
        uses: actions/checkout@v3

      # Ekstrak informasi proyek dari package.json dan simpan ke file temporary
      - name: Get Project Info
        id: get_project_info
        run: |
          if command -v jq &> /dev/null; then
            echo "PROJECT_NAME=$(jq -r .name package.json)" >> $GITHUB_ENV
            echo "PROJECT_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV
          else
            echo "PROJECT_NAME=Absensi Apps" >> $GITHUB_ENV
            echo "PROJECT_VERSION=v1.0.0" >> $GITHUB_ENV
          fi

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  #---

  # Job untuk build aplikasi
  build:
    # Mengubah 'needs' untuk bergantung pada 'start_notify'
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    # Menambahkan 'outputs' lagi agar bisa diakses oleh job 'notify'
    outputs:
      project_name: ${{ github.event.workflow_run.conclusion == 'success' && needs.build.outputs.project_name || 'Absensi Apps' }}
      project_version: ${{ github.event.workflow_run.conclusion == 'success' && needs.build.outputs.project_version || 'v1.0.0' }}

    steps:
      # Tidak perlu lagi checkout code dan get project info di sini
      - name: Checkout code
        uses: actions/checkout@v3

      # Buat file .env terlebih dahulu agar semua variabel tersedia
      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" > .env
          echo "DIRECT_DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" >> .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

      # Tambahkan step get project info untuk output
      - name: Get Project Info for Output
        id: set_project_info
        run: |
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Clone or pull on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          if [ ! -d "/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}" ]; then
            echo "Directory not found, cloning..."
            git clone https://github.com/azkal182/sigap-v2.git /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git checkout main
          else
            echo "Directory exists, pulling latest code..."
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git pull origin main
          fi
          exit
          EOF

      - name: Copy build files
        run: |
          rsync -avz --delete .next/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/.next/
          rsync -avz --delete public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/public/
          rsync -avz --delete package.json pnpm-lock.yaml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

      - name: Install deps and restart app on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          if pm2 describe ${{ matrix.app }} > /dev/null; then
            pm2 stop ${{ matrix.app }}
            pm2 delete ${{ matrix.app }}
          fi

          pnpm install --production

          # Buat file .env di server VPS
          echo "DIRECT_DATABASE_URL=\"postgresql://azkal:azkal@localhost:5432/${{ matrix.db }}?pgbouncer=true\"" > .env
          echo "DATABASE_URL=\"postgresql://azkal:azkal@localhost:6432/pool_${{ matrix.db }}?pgbouncer=true\"" >> .env
          echo "NEXTAUTH_URL=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_TRUST_HOST=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          exit
          EOF

  #---

  # Job untuk notifikasi
  notify:
    needs: [start_notify, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.start_notify.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Success
        if: success() && needs.build.result == 'success' && needs.deploy.result == 'success'
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ CI/CD Success%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🌍 URL: https://staging.amtsilatipusat.com%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}"

      - name: Notify Failure
        if: failure() || (needs.build.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy.result == 'skipped')
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ CI/CD Failed%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}%0APlease check logs!"
