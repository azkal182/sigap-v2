name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    outputs: # Tambahkan outputs di sini agar bisa diakses job lain
      project_name: ${{ steps.get_project_info.outputs.project_name }}
      project_version: ${{ steps.get_project_info.outputs.project_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get Project Info
        id: get_project_info # ID ini penting untuk mengakses output
        run: |
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: ${{ steps.get_project_info.outputs.project_name }}%0A🔖 Version: ${{ steps.get_project_info.outputs.project_version }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  #---

  # Job untuk build aplikasi
  build:
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    # Hapus output project_name dan project_version dari sini, karena sudah ada di start_notify
    outputs:
      build_status: ${{ job.status }} # Tambahkan status build untuk notifikasi

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify pnpm-lock.yaml exists
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pnpm-lock.yaml found"
          else
            echo "Error: pnpm-lock.yaml not found. Please commit it."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.4 # Gunakan versi pnpm yang spesifik

      # --- Implementasi Cache ---
      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      # --- Akhir Implementasi Cache ---
      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" > .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true
        run: |
          for i in {1..3}; do
            npx prisma migrate deploy && exit 0 || true
            echo "Migration failed, retrying in 5 seconds ($i/3)..."
            sleep 5
          done
          echo "Failed to run Prisma migrations after 3 attempts."
          exit 1 # Pastikan job gagal jika migrasi benar-benar gagal

      - name: Build Next.js app
        run: pnpm build

      # --- Mengelola Artefak ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4 # Menggunakan v4 untuk fitur terbaru
        with:
          name: absensi-build-artifacts # Nama artefak yang unik
          path: |
            .next/
            public/
            package.json
            pnpm-lock.yaml
          retention-days: 1 # Berapa lama artefak akan disimpan
      # --- Akhir Mengelola Artefak ---

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    steps:
      # --- Mengunduh Artefak ---
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: absensi-build-artifacts # Nama artefak harus sama dengan yang diupload
          path: ./ # Akan mengunduh ke direktori kerja saat ini
      # --- Akhir Mengunduh Artefak ---

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Clone or pull on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          if [ ! -d "/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}" ]; then
            echo "Directory not found, cloning..."
            # Pastikan GIT_URL memiliki token jika repo private
            GIT_URL="https://${{ secrets.GH_PAT }}@github.com/azkal182/sigap-v2.git"
            git clone "\$GIT_URL" /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git checkout main
          else
            echo "Directory exists, pulling latest code..."
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git pull origin main
          fi
          exit
          EOF

      - name: Copy build files to VPS
        run: |
          # Rsync file-file yang sudah diunduh dari artefak
          rsync -avz --delete .next/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/.next/
          rsync -avz --delete public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/public/
          rsync -avz --delete package.json pnpm-lock.yaml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

      - name: Install deps and restart app on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          if pm2 describe ${{ matrix.app }} > /dev/null; then
            pm2 stop ${{ matrix.app }}
            pm2 delete ${{ matrix.app }}
          fi

          # Install dependensi di VPS. Ini penting karena node_modules tidak ditransfer via artefak.
          pnpm install --production

          # Buat file .env di server VPS
          echo "DIRECT_DATABASE_URL=\"postgresql://azkal:azkal@localhost:5432/${{ matrix.db }}?pgbouncer=true\"" > .env
          echo "DATABASE_URL=\"postgresql://azkal:azkal@localhost:6432/pool_${{ matrix.db }}?pgbouncer=true\"" >> .env
          echo "NEXTAUTH_URL=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_TRUST_HOST=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          # Tambahkan variabel lingkungan spesifik aplikasi lain jika ada
          # echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          # echo "SUPABASE_PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }}" >> .env

          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          exit
          EOF

  #---

  # Job untuk notifikasi
  notify:
    needs: [start_notify, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      # Ambil PROJECT_NAME dan PROJECT_VERSION dari output job 'start_notify'
      PROJECT_NAME: ${{ needs.start_notify.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Send Telegram Notification
        run: |
          STATUS_ICON="✅"
          STATUS_TEXT="CI/CD Success"
          # Cek status dari semua job yang dibutuhkan
          if [[ "${{ needs.build.result }}" != "success" || "${{ needs.deploy.result }}" != "success" ]]; then
            STATUS_ICON="❌"
            STATUS_TEXT="CI/CD Failed"
          fi

          MESSAGE="<b>$STATUS_ICON $STATUS_TEXT</b>%0A"
          MESSAGE+="📦 Project: ${{ env.PROJECT_NAME }}%0A"
          MESSAGE+="🔖 Version: ${{ env.PROJECT_VERSION }}%0A"
          MESSAGE+="🌍 URL: https://staging.amtsilatipusat.com%0A"
          MESSAGE+="🕒 Time: ${{ env.TIMESTAMP }}%0A"

          if [[ "$STATUS_TEXT" == "CI/CD Failed" ]]; then
            MESSAGE+="🚨 Please check logs!"
          fi

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "text=$MESSAGE"
