name: CI/CD Absensi Apps

on:
  push:
    branches:
      - main

jobs:
  # Job untuk mengirim notifikasi saat CI/CD dimulai
  start_notify:
    runs-on: ubuntu-latest
    outputs: # Tambahkan outputs di sini agar bisa diakses job lain
      project_name: ${{ steps.get_project_info.outputs.project_name }}
      project_version: ${{ steps.get_project_info.outputs.project_version }}
    steps:
      # Checkout code di awal agar bisa mengakses package.json
      - name: Checkout code
        uses: actions/checkout@v3

      # Ekstrak informasi proyek dari package.json dan simpan ke output job
      - name: Get Project Info
        id: get_project_info # ID ini penting untuk mengakses output
        run: |
          if command -v jq &> /dev/null; then
            echo "project_name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT
            echo "project_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          else
            echo "project_name=Absensi Apps" >> $GITHUB_OUTPUT
            echo "project_version=v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Start
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 CI/CD Started%0A📦 Project: ${{ steps.get_project_info.outputs.project_name }}%0A🔖 Version: ${{ steps.get_project_info.outputs.project_version }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  #---

  # Job untuk build aplikasi
  build:
    needs: start_notify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    # Hapus output project_name dan project_version dari sini, karena sudah ada di start_notify
    outputs:
      # Anda mungkin tidak memerlukan output di sini lagi jika notifikasi mengambil dari start_notify
      # Namun, jika ada kebutuhan lain di masa depan, bisa dipertahankan
      # Misalnya, untuk memastikan build job berhasil mendapatkan info proyek
      # project_name: ${{ steps.set_project_info.outputs.project_name }}
      # project_version: ${{ steps.set_project_info.outputs.project_version }}
      build_status: ${{ job.status }} # Tambahkan status build untuk notifikasi

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # --- PERUBAHAN DI SINI: MENAMBAHKAN CACHE ---

      # Langkah cache untuk pnpm (dependencies)
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # Langkah cache untuk Next.js (build files)
      # Gunakan hash dari package.json dan pnpm-lock.yaml untuk invalidasi cache
      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.next/cache
            ${{ github.workspace }}/.next/static
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      # --- END PERUBAHAN CACHE ---

      # Buat file .env terlebih dahulu agar semua variabel tersedia
      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" > .env
          echo "DIRECT_DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@${{ secrets.DB_HOST }}:5432/${{ matrix.db }}?pgbouncer=true" >> .env
          echo "NEXTAUTH_URL=${{ matrix.url }}" >> .env
          echo "AUTH_TRUST_HOST=${{ matrix.url }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

      # Tidak perlu lagi Get Project Info for Output di sini
      # karena sudah diambil di job start_notify

      # --- PERUBAHAN DI SINI: MENYIMPAN ARTIFAK ---
      # Upload hasil build sebagai artefak untuk job 'deploy'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            .next/
            public/
            package.json
            pnpm-lock.yaml
          # Jika Anda memiliki file lain yang perlu disalin ke VPS, tambahkan di sini
      # --- END PERUBAHAN ---

  #---

  # Job untuk deploy aplikasi
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staging]
        include:
          - app: staging
            port: 4242
            folder: staging
            db: staging
            url: https://staging.amtsilatipusat.com

    steps:
      # --- PERUBAHAN DI SINI: MENGUNDUH ARTIFAK ---
      # Download artefak dari job 'build'
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
      # --- END PERUBAHAN ---

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Clone or pull on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          if [ ! -d "/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}" ]; then
            echo "Directory not found, cloning..."
            GIT_URL="https://${{ secrets.GH_PAT }}@github.com/azkal182/sigap-v2.git"
            git clone "\$GIT_URL" /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git checkout main
          else
            echo "Directory exists, pulling latest code..."
            cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}
            git pull origin main
          fi
          exit
          EOF

      - name: Copy build files
        run: |
          # Perintah rsync sekarang akan berhasil karena file sudah ada di runner
          rsync -avz --delete .next/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/.next/
          rsync -avz --delete public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/public/
          rsync -avz --delete package.json pnpm-lock.yaml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}/

      - name: Install deps and restart app on VPS
        run: |
          ssh -tt ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << EOF
          cd /home/${{ secrets.VPS_USER }}/project/${{ matrix.folder }}

          if pm2 describe ${{ matrix.app }} > /dev/null; then
            pm2 stop ${{ matrix.app }}
            pm2 delete ${{ matrix.app }}
          fi

          pnpm install --production

          # Buat file .env di server VPS
          echo "DIRECT_DATABASE_URL=\"postgresql://azkal:azkal@localhost:5432/${{ matrix.db }}?pgbouncer=true\"" > .env
          echo "DATABASE_URL=\"postgresql://azkal:azkal@localhost:6432/pool_${{ matrix.db }}?pgbouncer=true\"" >> .env
          echo "NEXTAUTH_URL=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_TRUST_HOST=\"${{ matrix.url }}\"" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

          pm2 start npm --name "${{ matrix.app }}" -- start -- -p ${{ matrix.port }}

          exit
          EOF

  #---

  # Job untuk notifikasi
  notify:
    # Pastikan 'needs' mencakup 'start_notify' untuk mendapatkan outputnya
    needs: [start_notify, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    env:
      # Ambil PROJECT_NAME dan PROJECT_VERSION dari output job 'start_notify'
      PROJECT_NAME: ${{ needs.start_notify.outputs.project_name || 'Unknown Project' }}
      PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version || 'Unknown Version' }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Notify Success
        # Kondisi ini akan mengecek status dari semua job yang dibutuhkan
        if: success() && needs.build.result == 'success' && needs.deploy.result == 'success'
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ CI/CD Success%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🌍 URL: https://staging.amtsilatipusat.com%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}"

      - name: Notify Failure
        # Kondisi ini akan dievaluasi jika ada job yang gagal atau di-skip karena kegagalan
        if: failure() || (needs.build.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy.result == 'skipped')
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ CI/CD Failed%0A📦 Project: ${{ env.PROJECT_NAME }}%0A🔖 Version: ${{ env.PROJECT_VERSION }}%0A🕒 Time: ${{ env.TIMESTAMP }}%0AGithub Run: ${{ env.GITHUB_RUN_URL }}%0APlease check logs!"
